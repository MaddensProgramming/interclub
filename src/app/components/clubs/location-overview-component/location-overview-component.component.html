@if (venues$ | async; as venues) {
<div style="display: flex; flex-direction: row; flex-wrap: wrap">
  @for (venue of venues; track venue) {
  <mat-card class="mat-elevation-z8" style="margin: 1rem; width: max-content">
    <mat-card-content>
      <div class="details">
        <label>Adres: </label>
        <span
          style="min-height: 5rem"
          [innerHTML]="venue.address | newlineToBreak"
        ></span>
        <label>Email: </label>
        <span>{{ venue.email }}</span>
        <label>Telefoon: </label>
        <span>{{ venue.phone }}</span>
        <label>Opmerkingen: </label>
        <span>{{ venue.remarks }}</span>
        <label>Niet beschikbaar:</label>
        <br />
        @for (date of venue.notavailable; track date) {
        <span>{{ date }}</span>
        }
      </div>
    </mat-card-content>
  </mat-card>
  }
</div>
} @else {
<mat-spinner></mat-spinner>
}
